name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: je

jobs:
  # ──────────────────────────────────────────────
  # Job 1: テストを通過させてからリリースへ進む
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

  # ──────────────────────────────────────────────
  # Job 2: マトリックスビルド → GitHub Release
  # ──────────────────────────────────────────────
  release:
    name: Build & Release (${{ matrix.label }})
    needs: test
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write # Release の作成・アセットのアップロードに必要

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            universal: false

          # macOS Universal Binary (arm64 + x86_64 を lipo で結合)
          - label: macos-universal
            os: macos-latest
            target: aarch64-apple-darwin  # lipo 前のメインターゲット
            archive_ext: tar.gz
            universal: true

          # Windows (x86_64)
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            universal: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # macOS Universal Binary 用に x86_64 ターゲットも追加
      - name: Add x86_64 target (macOS Universal only)
        if: matrix.universal == true
        run: rustup target add x86_64-apple-darwin

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      # ── Linux / Windows: ネイティブビルド ──
      - name: Build (native)
        if: matrix.universal == false
        run: cargo build --release --target ${{ matrix.target }}

      # ── macOS: 両アーキテクチャをビルドして lipo で Universal Binary 化 ──
      - name: Build arm64 (macOS Universal)
        if: matrix.universal == true
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64 (macOS Universal)
        if: matrix.universal == true
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create Universal Binary with lipo
        if: matrix.universal == true
        run: |
          lipo -create -output target/release/${{ env.BIN_NAME }} \
            target/aarch64-apple-darwin/release/${{ env.BIN_NAME }} \
            target/x86_64-apple-darwin/release/${{ env.BIN_NAME }}

      # ── アーカイブ作成 (Linux / macOS) ──
      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          ARCHIVE="${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.label }}.tar.gz"
          if [ "${{ matrix.universal }}" = "true" ]; then
            BIN_PATH="target/release/${{ env.BIN_NAME }}"
          else
            BIN_PATH="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          fi
          tar -czf "$ARCHIVE" -C "$(dirname "$BIN_PATH")" "$(basename "$BIN_PATH")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
        shell: bash

      # ── アーカイブ作成 (Windows) ──
      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        run: |
          $archive = "${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.label }}.zip"
          $bin = "target\${{ matrix.target }}\release\${{ env.BIN_NAME }}.exe"
          Compress-Archive -Path $bin -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      # ── GitHub Release にアップロード ──
      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ env.ARCHIVE }}
          allowUpdates: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }} # v1.0.0-beta など
          token: ${{ secrets.GITHUB_TOKEN }}
